<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Phases — find your PCOS care track</title>
<meta name="theme-color" content="#F4EEE1">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Phases">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F4EEE1; --paper:#FBF7EE;
    --terracotta:#C1704A; --terracotta-dim:#9C5636; --olive:#7D8455; --dusty:#7C93A8; --mustard:#D3A64C; --rose:#C97A93; --lav-deep:#9B8FB0;
    --charcoal:#3B342C; --charcoal-dim:rgba(59,52,44,0.62);
    --coral-pastel:#F6D9C7; --mint-pastel:#DCEEDD; --pink-pastel:#F8DCE3;
    --sky-pastel:#DCE7F4; --gold-pastel:#FBEAC0; --lavender-pastel:#E8DFF3;
    --serif:'Fraunces','Figtree',serif; --sans:'Figtree',-apple-system,BlinkMacSystemFont,sans-serif;
    --maxw:460px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{ background:#ddd4c2; font-family:var(--sans); color:var(--charcoal); display:flex; justify-content:center; min-height:100dvh; }
  .device{ width:100%; max-width:var(--maxw); min-height:100dvh; background:var(--cream); position:relative; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 0 60px rgba(0,0,0,0.25); }

  .topbar{ display:flex; align-items:center; gap:10px; padding:max(18px, env(safe-area-inset-top)) 20px 4px; min-height:34px; }
  .backbtn{ width:32px; height:32px; border:none; background:rgba(59,52,44,0.07); color:var(--charcoal); display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:50%; flex:none; }
  .backbtn svg{width:17px;height:17px;}
  .progress{ display:flex; gap:6px; flex:1; }
  .progress .seg{ flex:1; height:5px; border-radius:999px; background:rgba(59,52,44,0.12); overflow:hidden; }
  .progress .seg i{ display:block; height:100%; width:0%; background:var(--charcoal); border-radius:999px; transition:width .4s ease; }
  .progress .seg.done i{ width:100%; }
  .skiplink{ background:none;border:none;font-family:var(--sans);font-size:13px;font-weight:700;color:var(--charcoal);opacity:.55;cursor:pointer;padding:6px 2px; }

  .stage{ flex:1; display:flex; flex-direction:column; padding:6px 22px calc(26px + env(safe-area-inset-bottom)); overflow-y:auto; }
  .screen{ animation:rise .45s cubic-bezier(.16,1,.3,1) both; display:flex; flex-direction:column; flex:1; }
  @keyframes rise{ from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);} }

  h1.q{ font-family:var(--serif); font-weight:600; font-size:24px; line-height:1.24; margin:8px 0 6px; text-align:center; color:var(--charcoal); }
  h1.q .accent{ color:var(--terracotta); }
  p.sub{ font-size:13.5px; line-height:1.45; color:var(--charcoal-dim); text-align:center; margin:0 0 14px; font-weight:500; }
  .spacer{flex:1;}

  /* ---- mascot: Doc1 shape, lively bob + quick blink ---- */
  .mascot{ width:120px; height:138px; margin:2px auto 6px; position:relative; animation:bob 2.4s ease-in-out infinite; }
  .mascot.sm{ width:78px; height:90px; margin:0 auto 10px; }
  .mascot.big{ width:150px; height:172px; }
  @keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
  @media (prefers-reduced-motion: reduce){ .mascot{animation:none;} }
  .mascot .mbody{ position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:76%; height:32%; background:var(--charcoal); border-radius:46% 46% 30% 30%; }
  .mascot .mhead{ position:absolute; top:0; left:8%; width:84%; height:74%; border-radius:50%; background:var(--terracotta); overflow:hidden; box-shadow:0 10px 20px rgba(59,52,44,.15); }
  .mascot .mhead i.msh{ position:absolute; top:0; bottom:0; background:var(--terracotta-dim); display:block; }
  .mascot .mhead.full i.msh{ left:0; width:100%; }
  .mascot .mhead.crescent i.msh{ right:-38%; width:60%; border-radius:50%; }
  .mascot .mhead.quarter i.msh{ right:0; width:50%; border-radius:0 999px 999px 0; }
  .mascot .mhead.gibbous i.msh{ right:-8%; width:72%; border-radius:50%; }
  .mascot .mhead.lastquarter i.msh{ left:0; width:50%; border-radius:999px 0 0 999px; }
  .mascot .cheek{ position:absolute; width:16%; height:10%; border-radius:50%; background:rgba(59,52,44,.16); top:55%; }
  .mascot .cheek.l{left:9%;} .mascot .cheek.r{right:9%;}
  .mascot .mface{ position:absolute; width:52%; left:24%; top:28%; }
  .mascot .mface .eyes{ transform-box:fill-box; transform-origin:50% 50%; animation:blink 2.4s ease-in-out infinite; }
  @keyframes blink{ 0%,82%,100%{transform:scaleY(1);} 90%{transform:scaleY(.1);} }
  @media (prefers-reduced-motion: reduce){ .mascot .mface .eyes{animation:none;} }

  /* ---- sparkle: big, glowing, everywhere the mascot shows up ---- */
  .mascotwrap{ position:relative; width:150px; margin:2px auto 6px; }
  .sparkle{ position:absolute; width:26px; height:26px; opacity:.55; pointer-events:none; animation:twinkle 1.7s ease-in-out infinite; filter:drop-shadow(0 0 5px currentColor); z-index:5; }
  .sparkle.lg{ width:34px; height:34px; }
  .sparkle.sm2{ width:16px; height:16px; }
  .sparkle svg{ width:100%; height:100%; fill:currentColor; }
  @keyframes twinkle{ 0%,100%{opacity:.35; transform:scale(.6) rotate(0deg);} 50%{opacity:1; transform:scale(1.25) rotate(35deg);} }
  @media (prefers-reduced-motion: reduce){ .sparkle{animation:none; opacity:.8;} }

  /* ---- one-shot selection sparkle burst ---- */
  .burst-spark{ position:absolute; top:50%; left:50%; width:12px; height:12px; margin:-6px; border-radius:3px; opacity:0; pointer-events:none; animation:burstpop .7s ease-out forwards; filter:drop-shadow(0 0 4px currentColor); }
  @keyframes burstpop{ 0%{opacity:0; transform:translate(0,0) scale(.3) rotate(0deg);} 20%{opacity:1;} 100%{opacity:0; transform:translate(var(--tx),var(--ty)) scale(1.3) rotate(110deg);} }
  @media (prefers-reduced-motion: reduce){ .burst-spark{display:none;} }

  .cardgrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .cardgrid.list{ grid-template-columns:1fr; gap:8px; }
  .card{ border-radius:18px; padding:16px; min-height:100px; display:flex; flex-direction:column; justify-content:space-between; cursor:pointer; position:relative; overflow:hidden; border:none; text-align:left; transition:transform .15s ease; -webkit-user-select:none; user-select:none; }
  .card:active{ transform:scale(.96); }
  .card .cicon{ width:38px;height:38px;border-radius:10px;background:rgba(59,52,44,0.08);display:flex;align-items:center;justify-content:center;position:relative; }
  .card .cicon svg{ width:19px;height:19px;fill:var(--charcoal); }
  .card .clabel{ font-family:var(--sans); font-weight:800; font-size:16px; color:var(--charcoal); line-height:1.25; }
  .card .badge{ position:absolute;top:9px;right:9px;width:24px;height:24px;border-radius:50%;background:var(--charcoal);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.5);transition:all .18s ease; }
  .card .badge svg{ width:13px;height:13px;stroke:var(--paper);fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round; }
  .card.selected .badge{ opacity:1;transform:scale(1); }
  .card.selected{ box-shadow:0 0 0 2.5px var(--charcoal); }
  .card.locked{ pointer-events:none; }
  .card.row{ flex-direction:row; align-items:center; justify-content:flex-start; gap:12px; min-height:0; padding:12px 14px; border-radius:16px; }
  .card.row .cicon{ width:32px; height:32px; border-radius:9px; flex:none; }
  .card.row .cicon svg{ width:16px; height:16px; }
  .card.row .clabel{ font-size:15.5px; line-height:1.2; flex:1; }
  .card.row .badge{ position:static; margin-left:auto; width:22px; height:22px; flex:none; }
  .card.row .badge svg{ width:12px; height:12px; }
  .card.bignum{ align-items:center; justify-content:center; text-align:center; min-height:100px; padding:10px 8px; }
  .card.bignum .clabel{ font-family:var(--serif); font-weight:800; font-size:30px; line-height:1.06; width:100%; }
  .c-coral{background:var(--coral-pastel);} .c-moss{background:var(--mint-pastel);} .c-berry{background:var(--pink-pastel);}
  .c-sky{background:var(--sky-pastel);} .c-gold{background:var(--gold-pastel);} .c-ink{background:var(--lavender-pastel);}

  .insightcard{ background:var(--paper); border-left:4px solid var(--terracotta); border-radius:14px; padding:18px 16px; margin:30px 0 16px; box-shadow:0 4px 14px rgba(59,52,44,.06); animation:fadein .35s ease both; }
  .insightcard p{ font-size:19px; font-weight:800; line-height:1.38; color:var(--charcoal); margin:0; text-align:center; }
  .btn.continueBtn{ margin-top:8px; }
  @keyframes fadein{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .trustline{ display:flex; align-items:center; justify-content:center; gap:6px; font-size:11.5px; font-weight:700; color:var(--charcoal); opacity:.5; margin-top:10px; }
  .trustline svg{ width:12px; height:12px; fill:var(--charcoal); }

  .personagrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .personacard{ border-radius:18px; padding:12px; background:var(--paper); text-align:center; border:1.5px solid rgba(59,52,44,0.08); }
  .personacard .mascot{ margin:0 auto 6px; }
  .personatag{ display:inline-block; font-family:var(--sans); font-weight:800; font-size:10px; letter-spacing:.04em; text-transform:uppercase; color:var(--paper); padding:5px 10px; border-radius:999px; margin-bottom:8px; }
  .persona-a .personatag{ background:var(--terracotta); }
  .persona-b .personatag{ background:var(--olive); }
  .personarow{ display:flex; align-items:center; gap:8px; padding:7px 2px; font-size:13px; font-weight:700; color:var(--charcoal); text-align:left; border-bottom:1px solid rgba(59,52,44,0.08); }
  .personarow:last-child{ border-bottom:none; }
  .personarow .picon{ width:23px; height:23px; border-radius:50%; background:rgba(59,52,44,0.08); display:flex; align-items:center; justify-content:center; flex:none; }
  .personarow .picon svg{ width:12px; height:12px; fill:var(--charcoal); }

  .btn{ display:flex; align-items:center; justify-content:center; width:100%; padding:15px; background:var(--charcoal); color:var(--paper); border:none; border-radius:999px; font-family:var(--sans); font-weight:700; font-size:15px; cursor:pointer; transition:transform .15s ease,opacity .15s ease; }
  .btn:active{ transform:scale(.98); }
  .btn.disabled{ opacity:.32; pointer-events:none; }
  .textlink{ background:none;border:none;color:var(--charcoal);opacity:.55;font-family:var(--sans);font-size:13px;font-weight:700;text-decoration:underline;text-underline-offset:3px;margin-top:14px;align-self:center;cursor:pointer; }

  .field{ background:var(--paper);border:1.5px solid rgba(59,52,44,0.14);border-radius:18px;padding:14px 16px;margin-bottom:14px; }
  .field label{ display:block;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--charcoal-dim);margin-bottom:4px;font-weight:800; }
  .field input{ width:100%;background:none;border:none;outline:none;font-size:16px;color:var(--charcoal);font-family:var(--sans);font-weight:600; }
  .field input::placeholder{ color:rgba(59,52,44,0.4); }

  .tfrow{ display:flex; gap:12px; margin:8px 0 4px; }
  .tfbtn{ flex:1; padding:20px 10px; min-height:100px; display:flex; align-items:center; justify-content:center; border-radius:18px; border:2px solid rgba(59,52,44,0.14); background:var(--paper); font-family:var(--serif); font-weight:800; font-size:22px; color:var(--charcoal); cursor:pointer; transition:transform .15s ease, border-color .15s ease, background .15s ease; position:relative; }
  .tfbtn:active{ transform:scale(.96); }
  .tfbtn.picked{ border-color:var(--terracotta); background:var(--coral-pastel); }
  .tfbtn.locked{ pointer-events:none; }

  .guessval{ font-family:var(--serif); font-weight:700; font-size:34px; color:var(--charcoal); text-align:center; margin:2px 0 4px; }
  .guesssub{ text-align:center; font-size:13.5px; font-weight:600; color:var(--charcoal-dim); margin-bottom:14px; }
  input[type=range]{ -webkit-appearance:none; width:100%; height:7px; border-radius:999px; background:rgba(59,52,44,0.14); margin:8px 0 18px; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:26px; height:26px; border-radius:50%; background:var(--charcoal); border:4px solid var(--paper); box-shadow:0 2px 8px rgba(0,0,0,.25); cursor:pointer; }
  input[type=range]::-moz-range-thumb{ width:26px; height:26px; border-radius:50%; background:var(--charcoal); border:4px solid var(--paper); cursor:pointer; }
  .rangeends{ display:flex; justify-content:space-between; font-size:11px; font-weight:700; color:var(--charcoal-dim); margin-top:-12px; margin-bottom:16px; }

  .dotsgrid{ display:flex; gap:7px; justify-content:center; flex-wrap:wrap; max-width:260px; margin:10px auto 14px; }
  .dotsgrid .dot{ width:15px; height:15px; border-radius:50%; opacity:.92; }
  .dotsgrid .dot.c-coral{background:var(--terracotta);} .dotsgrid .dot.c-moss{background:var(--olive);}
  .dotsgrid .dot.c-berry{background:var(--rose);} .dotsgrid .dot.c-sky{background:var(--dusty);}
  .dotsgrid .dot.c-gold{background:var(--mustard);} .dotsgrid .dot.c-ink{background:var(--lav-deep);}

  .receipt{ width:100%; background:var(--charcoal); border-radius:22px; padding:24px 20px 20px; margin-bottom:18px; box-shadow:0 12px 26px rgba(59,52,44,.22); }
  .receipt .cross{ text-align:center; font-size:14.5px; font-weight:600; color:rgba(251,247,238,.5); text-decoration:line-through; margin:8px 0; font-family:var(--sans); }
  .receipt .final{ text-align:center; font-size:18px; font-weight:600; font-style:italic; color:var(--gold-pastel); font-family:var(--serif); margin-top:14px; padding-top:14px; border-top:1px solid rgba(251,247,238,.16); }

  .recaplist{ width:100%; display:flex; flex-direction:column; gap:9px; margin-bottom:16px; }
  .recaprow{ display:flex; align-items:center; gap:12px; background:var(--paper); border-radius:16px; padding:11px 13px; text-align:left; border:1.5px solid rgba(59,52,44,0.06); }
  .recaprow .ricon{ width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex:none; }
  .recaprow .ricon svg{ width:17px; height:17px; fill:var(--paper); }
  .recaprow .rlabel{ font-size:10.5px; font-weight:700; color:var(--charcoal-dim); text-transform:uppercase; letter-spacing:.03em; }
  .recaprow .rvalue{ font-family:var(--sans); font-weight:700; font-size:14px; color:var(--charcoal); line-height:1.28; }
  .ric-coral{background:var(--terracotta);} .ric-moss{background:var(--olive);} .ric-berry{background:var(--rose);} .ric-sky{background:var(--dusty);}

  .successwrap{ align-items:center; text-align:center; justify-content:center; }
  .successwrap h1{ font-family:var(--serif); font-size:23px; font-weight:600; color:var(--charcoal); margin:12px 0 8px; }
  .successwrap p{ font-size:14px; font-weight:500; color:var(--charcoal-dim); max-width:30ch; margin:0 0 22px; line-height:1.5; }
  .startover{ font-size:12px; font-weight:700; color:var(--charcoal); opacity:.45; text-decoration:underline; cursor:pointer; }

  .wordmark{ display:flex; align-items:center; gap:7px; justify-content:center; margin:2px 0 10px; }
  .wordmark .dot{ width:12px;height:12px;border-radius:50%;background:var(--charcoal); }
  .wordmark span{ font-family:var(--serif); font-weight:700; font-size:13px; color:var(--charcoal); opacity:.72; }
  .trustpill{ display:inline-flex; align-items:center; gap:7px; background:rgba(59,52,44,0.07); color:var(--charcoal); border-radius:999px; padding:6px 14px; font-size:10.5px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; margin-bottom:10px; }
  .welcome{ align-items:center; justify-content:center; text-align:center; }
  .welcome h1{ font-family:var(--serif); font-weight:600; font-size:27px; line-height:1.2; color:var(--charcoal); margin:4px 0 8px; }
  .welcome p.lead{ font-size:14px; font-weight:500; line-height:1.5; color:var(--charcoal-dim); margin:0 0 18px; max-width:28ch; }
  .meta-row{ display:flex; gap:9px; margin:0 0 24px; flex-wrap:wrap; justify-content:center; }
  .meta-row .m{ font-size:11.5px; color:var(--charcoal); font-weight:700; display:flex; align-items:center; gap:6px; background:rgba(59,52,44,0.06); border-radius:999px; padding:7px 13px; }
  .meta-row .m svg{ width:12px; height:12px; fill:var(--terracotta); }

  @media (prefers-reduced-motion: reduce){ .screen{animation:none;} }
</style>
</head>
<body>
  <div class="device" id="device">
    <div class="topbar" id="topbar"></div>
    <div class="stage" id="stage"></div>
  </div>

<script>
(function(){
  "use strict";

  var SPARK_SVG = '<svg viewBox="0 0 24 24"><path d="M12 1c0 6.5 2 9.5 9.5 10-7.5.5-9.5 3.5-9.5 10 0-6.5-2-9.5-9.5-10C10 10.5 12 7.5 12 1z"/></svg>';
  var SPARK_TONES = ['var(--mustard)','var(--terracotta)','var(--olive)','var(--rose)'];

  // sparkle spots, scaled to size — every mascot gets a few, not just hero moments
  var SPARK_SPOTS = {
    sm:  [ {top:'-10%', left:'0%', size:'sm2'}, {top:'62%', left:'88%', size:'sm2'} ],
    def: [ {top:'-8%', left:'-6%', size:''}, {top:'18%', left:'92%', size:'sm2'}, {top:'74%', left:'-8%', size:'sm2'} ],
    big: [ {top:'-6%', left:'-8%', size:'lg'}, {top:'10%', left:'94%', size:''}, {top:'72%', left:'-10%', size:''}, {top:'86%', left:'86%', size:'sm2'} ]
  };

  function sparksFor(spots){
    var html='';
    spots.forEach(function(s,k){
      var tone = SPARK_TONES[k%SPARK_TONES.length];
      html += '<span class="sparkle '+s.size+'" style="top:'+s.top+';left:'+s.left+';animation-delay:'+(k*0.35)+'s;color:'+tone+';">'+SPARK_SVG+'</span>';
    });
    return html;
  }

  function mascot(phase, size){
    var cls = size==='big' ? ' big' : (size==='sm' ? ' sm' : '');
    var spots = size==='big' ? SPARK_SPOTS.big : (size==='sm' ? SPARK_SPOTS.sm : SPARK_SPOTS.def);
    return '<div class="mascot'+cls+'">'+
      '<div class="mbody"></div>'+
      '<div class="mhead '+phase+'"><i class="msh"></i></div>'+
      '<div class="cheek l"></div><div class="cheek r"></div>'+
      '<svg class="mface" viewBox="0 0 100 46">'+
        '<g class="eyes">'+
          '<path d="M12,24 Q24,8 36,24" stroke="#3B342C" stroke-width="7" fill="none" stroke-linecap="round"/>'+
          '<path d="M64,24 Q76,8 88,24" stroke="#3B342C" stroke-width="7" fill="none" stroke-linecap="round"/>'+
        '</g>'+
        '<path d="M22,32 Q50,54 78,32" stroke="#3B342C" stroke-width="7" fill="none" stroke-linecap="round"/>'+
      '</svg>'+
      sparksFor(spots)+
    '</div>';
  }

  // hero moments (welcome, receipt, recap, success) pile on extra sparkles around the mascot
  function mascotHero(phase){
    var wrap = document.createElement('div'); wrap.className='mascotwrap';
    wrap.innerHTML = mascot(phase,'big');
    var extra = [
      {top:'32%', left:'-14%', delay:'.2s', tone:1, size:'sm2'},
      {top:'0%', left:'40%', delay:'1s', tone:2, size:'sm2'},
      {top:'96%', left:'40%', delay:'1.6s', tone:0, size:'lg'}
    ];
    extra.forEach(function(s){
      var sp=document.createElement('span'); sp.className='sparkle '+s.size;
      sp.style.top=s.top; sp.style.left=s.left; sp.style.animationDelay=s.delay;
      sp.style.color=SPARK_TONES[s.tone];
      sp.innerHTML=SPARK_SVG;
      wrap.appendChild(sp);
    });
    return wrap;
  }

  // one-shot sparkle burst, spawned from a selected card's badge (or the element itself)
  function burst(targetEl){
    if(!targetEl) return;
    var cs = getComputedStyle(targetEl);
    if(cs.position==='static') targetEl.style.position='relative';
    for(var k=0;k<6;k++){
      (function(k){
        var s=document.createElement('span'); s.className='burst-spark';
        var tone = SPARK_TONES[k%SPARK_TONES.length];
        s.style.background = tone;
        s.style.color = tone;
        var angle = (k*60) + Math.random()*30;
        var dist = 18 + Math.random()*14;
        s.style.setProperty('--tx',(Math.cos(angle*Math.PI/180)*dist).toFixed(1)+'px');
        s.style.setProperty('--ty',(Math.sin(angle*Math.PI/180)*dist).toFixed(1)+'px');
        s.style.animationDelay=(k*40)+'ms';
        targetEl.appendChild(s);
        setTimeout(function(){ if(s.parentNode) s.parentNode.removeChild(s); }, 750);
      })(k);
    }
  }

      stage.appendChild(el);

      var openers = {little:'It matters more than that.', guided:'That\u2019s about right.', very:'You\u2019re on the right track.', only:'It matters — but not the whole story.'};
      wireSingleSelect(dietEls, opts, function(o){
        state.dietPick=o.id;
        el.querySelector('h1.q').textContent = openers[o.id];
        revealInline(el, 'Diet and exercise help. But it must fit you. One plan won\u2019t fit all.');
      });
      return;
    }

    if(name==='quizD'){
      el = screenWrap('question');
      el.innerHTML = '<h1 class="q">Can PCOS be managed well enough to reach your goals?</h1>'+
        '<div class="tfrow" id="row">'+
          '<button class="tfbtn" data-v="yes">Yes</button>'+
          '<button class="tfbtn" data-v="no">No</button>'+
        '</div>';
      var sp7=document.createElement('div'); sp7.className='spacer'; el.appendChild(sp7);
      stage.appendChild(el);
      var pickTokenD = 0;
      el.querySelectorAll('.tfbtn').forEach(function(b){
        b.onclick=function(){
          state.tfD=b.dataset.v;
          el.querySelectorAll('.tfbtn').forEach(function(x){x.classList.remove('picked');});
          b.classList.add('picked');
          burst(b);
          var opener = state.tfD==='yes' ? 'Yes — exactly right.' : 'Actually, yes.';
          var myToken = ++pickTokenD;
          setTimeout(function(){
            if(myToken!==pickTokenD) return;
            el.querySelector('h1.q').textContent = opener;
            revealInline(el, 'Everyone\u2019s path looks different. Let\u2019s find yours.');
          }, 220);
        };
      });
      return;
    }

    if(name==='quizE'){
      el = screenWrap('question');
      el.innerHTML = '<h1 class="q">What should a PCOS workshop get right?</h1><p class="sub">Pick 3.</p>';
      var g6=document.createElement('div'); g6.className='cardgrid'; g6.id='credGrid';
      CRED.forEach(function(o){
        var c=iconCard(o); c.dataset.id=o.id;
        c.onclick=function(){
          var id=this.dataset.id;
          if(state.cred.has(id)){ state.cred.delete(id); this.classList.remove('selected'); }
          else { if(state.cred.size>=3) return; state.cred.add(id); this.classList.add('selected'); burst(this.querySelector('.badge')); }
          refreshCred();
        };
        g6.appendChild(c);
      });
      el.appendChild(g6);
      var sp8=document.createElement('div'); sp8.className='spacer'; el.appendChild(sp8);
      var btn=document.createElement('button'); btn.className='btn disabled'; btn.id='credBtn'; btn.textContent='Continue';
      btn.onclick=function(){
        if(state.cred.size!==3) return;
        g6.querySelectorAll('.card').forEach(function(c){ c.classList.add('locked'); });
        btn.remove(); sp8.remove();
        revealInline(el,
          'Doctors check it. Real patients help write it. We keep it fresh. That\u2019s care, not content.');
      };
      el.appendChild(btn);
      stage.appendChild(el);
      function refreshCred(){
        g6.querySelectorAll('.card').forEach(function(c){ c.classList.toggle('locked', state.cred.size>=3 && !state.cred.has(c.dataset.id)); });
        btn.className='btn'+(state.cred.size===3?'':' disabled');
      }
      return;
    }

    if(name==='finale'){
      el = screenWrap('question');
      el.appendChild(mascotHero('full'));
      var receiptWrap = document.createElement('div');
      receiptWrap.innerHTML =
        '<div class="receipt">'+
          '<div class="cross">Generic advice</div>'+
          '<div class="cross">One-size-fits-all plans</div>'+
          '<div class="cross">Guesswork</div>'+
          '<div class="final">Only your path ahead.</div>'+
        '</div>';
      el.appendChild(receiptWrap.firstChild);
      var cf=document.createElement('button'); cf.className='btn'; cf.textContent='See my path'; cf.onclick=next;
      el.appendChild(cf);
      stage.appendChild(el);
      return;
    }

    if(name==='payoff'){
      var track = TRACKS[state.answers.goal] || TRACKS.cycle;
      var fs = firstSymptom();
      var kLabel = (KNOWLEDGE.filter(function(k){return k.id===state.answers.knowledge;})[0]||{}).label || 'wherever you are';
      var rows = [
        {label:'Your focus is', value:track.title, phase:track.phase},
        fs ? {label:'Because you mentioned', value:fs.label, icon:fs.icon} : null,
        {label:'We\u2019re pacing this for', value:kLabel, icon:'book'},
        {label:'One thing to know', value:track.fact, icon:'spark'}
      ].filter(Boolean);
      el = screenWrap('reveal');
      el.appendChild(mascotHero(track.phase));
      var h2=document.createElement('h1'); h2.className='q'; h2.textContent='So, here\u2019s your path'; el.appendChild(h2);
      var rl=document.createElement('div'); rl.className='recaplist'; el.appendChild(rl);
      var save=document.createElement('button'); save.className='btn'; save.textContent='Save my spot'; save.onclick=next;
      stage.appendChild(el);
      el.appendChild(save);
      var tones=['ric-coral','ric-moss','ric-berry','ric-sky'];
      rows.forEach(function(r,idx){
        var row=document.createElement('div'); row.className='recaprow';
        var tone=tones[idx%tones.length];
        var iconHtml = r.icon ? ICONS[r.icon] : '<div class="mhead '+r.phase+'" style="position:relative;width:100%;height:100%;"><i class="msh"></i></div>';
        row.innerHTML='<span class="ricon '+tone+'">'+iconHtml+'</span><span><div class="rlabel"></div><div class="rvalue"></div></span>';
        row.querySelector('.rlabel').textContent=r.label;
        row.querySelector('.rvalue').textContent=r.value;
        rl.appendChild(row);
      });
      return;
    }

    if(name==='email'){
      var track2 = TRACKS[state.answers.goal] || TRACKS.cycle;
      el = screenWrap('question');
      el.innerHTML =
        '<h1 class="q">Where should we send it?</h1>'+
        '<p class="sub">Your '+track2.title+' guide + invite.</p>'+
        '<div class="field"><label>Email</label><input type="email" id="emailInput" placeholder="you@email.com" autocomplete="email"></div>'+
        '<div class="spacer"></div>'+
        '<button class="btn" id="reserveBtn">Reserve my spot</button>'+
        '<button class="textlink" id="skipEmail">Skip for now, I\u2019ll browse first</button>';
      stage.appendChild(el);
      el.querySelector('#reserveBtn').onclick=function(){
        var v=el.querySelector('#emailInput').value.trim();
        state.answers.email=v||null; next();
      };
      el.querySelector('#skipEmail').onclick=function(){ state.answers.email=null; next(); };
      return;
    }

    if(name==='success'){
      var track3 = TRACKS[state.answers.goal] || TRACKS.cycle;
      el = screenWrap('successwrap');
      var msg = state.answers.email
        ? 'Check <strong>'+state.answers.email+'</strong> for your '+track3.title+' resources.'
        : 'Your '+track3.title+' focus is saved for when you\u2019re ready.';
      el.appendChild(mascotHero(track3.phase));
      var h=document.createElement('h1'); h.textContent = state.answers.email ? 'You\u2019re in.' : 'Good to have you.';
      var p=document.createElement('p'); p.innerHTML=msg;
      el.appendChild(h); el.appendChild(p);
      var again=document.createElement('div'); again.className='startover'; again.textContent='Start over';
      again.onclick=function(){
        state.answers={age:null,knowledge:null,symptoms:[],goal:null,fertilityTime:null,doctor:null,email:null};
        state.guess=20; state.tfA=null; state.tfD=null; state.dietPick=null; state.cred=new Set();
        goTo(0);
      };
      el.appendChild(again);
      stage.appendChild(el);
      return;
    }
  }

  goTo(0);
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
</body>
</html>
